<!DOCTYPE html>
<html>
<head>
  <title>Sample Page</title>
</head>
<body>
  <!-- 1.1.1: Missing alt attribute on img -->
  <img src="hero-banner.jpg" width="800" height="400">

  <!-- 1.4.3: Low contrast text (gray on white) -->
  <p style="color:#aaa; background:#fff; font-size:16px;">
    Welcome to our company. We provide excellent services to all our customers.
  </p>

  <!-- 1.3.1: Form input without label -->
  <div>
    <input type="text" placeholder="Enter your name" id="name-field">
  </div>

  <!-- 4.1.2: Button with no text content (no accessible name) -->
  <button onclick="submitForm()"></button>

  <!-- 2.4.4: Non-descriptive link text -->
  <a href="/about">Click here</a>
  <a href="/contact">Read more</a>

  <!-- 3.1.1: Missing lang attribute on html element (see <html> above) -->

  <!-- 1.3.1: Non-sequential heading levels (h1 then h4) -->
  <h1>Main Title</h1>
  <h4>Subsection About Us</h4>

  <!-- 1.4.3: More low contrast -->
  <p style="color:#c0c0c0; background:#f5f5f5;">
    Contact us at support@company.com for assistance.
  </p>

  <!-- 2.4.1: No skip navigation link -->
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/products">Products</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <!-- 1.3.1: Table without headers -->
  <table>
    <tr>
      <td>Product</td>
      <td>Price</td>
      <td>Stock</td>
    </tr>
    <tr>
      <td>Widget A</td>
      <td>$29.99</td>
      <td>In Stock</td>
    </tr>
  </table>

  <!-- 2.4.7: Focus outline removed -->
  <style>
    * { outline: none; }
    button { background: #eee; border: none; padding: 8px 16px; }
  </style>

  <!-- 4.1.1: Duplicate IDs -->
  <div id="name-field">Some content</div>

  <!-- 3.3.2: Form with no labels or instructions -->
  <form>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button type="submit">Go</button>
  </form>

</body>
</html>
